<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maps Wisata Siak</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#FFFACD;
}

header{
  text-align:center;
  padding:25px;
  font-size:28px;
  font-weight:bold;
  background:linear-gradient(90deg,#F5C857,#FFD84D);
  color:white;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
  margin-bottom:20px;
  overflow:hidden;
}

.card h3{
  margin:0;
  padding:15px;
  background:#f5c857;
  color:white;
}

.map{
  width:100%;
  height:300px;
  border:0;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  font-size:14px;
  color:#333;
}
</style>
</head>

<body>

<header>Maps Wisata Kabupaten Siak</header>

<div class="container">

  <!-- ISTANA SIAK -->
  <div class="card">
    <h3>Istana Siak Sri Indrapura</h3>
    <iframe class="map"
      src="https://www.google.com/maps?q=Istana%20Siak%20Sri%20Indrapura&output=embed">
    </iframe>
  </div>

  <!-- DANAU ZAMRUD -->
  <div class="card">
    <h3>Danau Zamrud Siak</h3>
    <iframe class="map"
      src="https://www.google.com/maps?q=Danau%20Zamrud%20Siak&output=embed">
    </iframe>
  </div>

  <!-- JEMBATAN TENGKU AGUNG -->
  <div class="card">
    <h3>Jembatan Tengku Agung Sultanah Latifah</h3>
    <iframe class="map"
      src="https://www.google.com/maps?q=Jembatan%20Tengku%20Agung%20Sultanah%20Latifah%20Siak&output=embed">
    </iframe>
  </div>

</div>

<footer>
  © 2026 Wisata Kabupaten Siak | Maps Guide
</footer>

</body>
</html>
