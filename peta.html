<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maps Wisata Siak</title>

<style>

body{
margin:0;
font-family:Arial;
background:#FFFACD;
padding-top:90px;
}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
height:70px;
display:flex;
align-items:center;
padding:0 15px;
z-index:100;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(10px);
transition:0.4s;
}

.logo{
font-size:28px;
font-weight:bold;
color:#FFD84D;
margin-right:20px;
}

.menu{
display:flex;
gap:22px;
overflow-x:auto;
white-space:nowrap;
scrollbar-width:none;
}

.menu::-webkit-scrollbar{
display:none;
}

.menu a{
color:white;
text-decoration:none;
font-size:16px;
}

.menu a:hover{
color:#FFD84D;
}

/* NAVBAR SCROLL */
.navbar.active{
background:#fff9c4;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.navbar.active .menu a,
.navbar.active .logo{
color:#333;
}

/* BACK BUTTON */
.back-btn{
display:inline-block;
margin:20px;
padding:10px 20px;
font-weight:bold;
color:white;
text-decoration:none;
border-radius:10px;
background:linear-gradient(45deg,#FFD54F,#FF9800);
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* JUDUL */
header{
text-align:center;
padding:10px;
font-size:28px;
font-weight:bold;
color:#5D4037;
}

/* CONTAINER */
.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* CARD */
.card{
background:linear-gradient(135deg,#FFF9C4,#FFD54F);
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
margin-bottom:25px;
overflow:hidden;
padding:15px;

opacity:0;
transform:translateY(40px);
transition:0.6s;
}

.card.show{
opacity:1;
transform:translateY(0);
}

.card h3{
margin:5px 0 15px 0;
color:#5D4037;
text-align:center;
}

/* MAP */
.map{
width:100%;
height:350px;
border-radius:12px;
border:none;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar" id="navbar">

<div class="logo">Siak</div>

<div class="menu">

<a href="index.html" class="back-btn">⬅ Back</a>

<header>Maps Wisata Kabupaten Siak</header>

<div class="container">

<!-- ISTANA SIAK -->
<div class="card">
<h3>Istana Siak Sri Indrapura</h3>
<iframe class="map"
src="https://www.google.com/maps?q=Istana%20Siak%20Sri%20Indrapura&output=embed">
</iframe>
</div>

<!-- DANAU ZAMRUD -->
<div class="card">
<h3>Danau Zamrud Siak</h3>
<iframe class="map"
src="https://www.google.com/maps?q=Danau%20Zamrud%20Siak&output=embed">
</iframe>
</div>

<!-- JEMBATAN -->
<div class="card">
<h3>Jembatan Tengku Agung Sultanah Latifah</h3>
<iframe class="map"
src="https://www.google.com/maps?q=Jembatan%20Tengku%20Agung%20Sultanah%20Latifah%20Siak&output=embed">
</iframe>
</div>

</div>

<script>

/* animasi card */
const cards=document.querySelectorAll('.card');

function reveal(){

const trigger=window.innerHeight*0.85;

cards.forEach(card=>{

const top=card.getBoundingClientRect().top;

if(top<trigger){
card.classList.add('show');
}

});

}

window.addEventListener('scroll',reveal);
reveal();

/* navbar scroll */
window.addEventListener("scroll",function(){

let navbar=document.getElementById("navbar");

if(window.scrollY>50){
navbar.classList.add("active");
}else{
navbar.classList.remove("active");
}

});

</script>

</body>
</html>
