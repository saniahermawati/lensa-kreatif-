<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeri Siak</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #FFFACD;
  margin: 0;
}

/* JUDUL */
h2 {
  text-align: center;
  padding: 20px;
  font-size: 28px;
}

/* GRID GALERI */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
  max-width: 1000px;
  margin: auto;
}

/* ITEM */
.item {
  position: relative;
  overflow: hidden;
  border-radius: 18px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
  cursor: pointer;

  opacity: 0;
  transform: translateY(40px);
  transition: 0.5s;
}

.item.show {
  opacity: 1;
  transform: translateY(0);
}

/* GAMBAR */
.item img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  transition: 0.3s;
}

.item:hover img {
  transform: scale(1.1);
}

/* TEKS */
.caption {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 10px;
  color: #fff;
  text-align: center;
  font-weight: bold;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
}

/* POPUP */
.popup {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 100;
}

.popup img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 12px;
}

.popup.active {
  display: flex;
}
</style>
</head>

<body>

<h2>Galeri Kabupaten Siak</h2>

<div class="gallery">

  <div class="item">
    <img src="https://image2url.com/r2/default/images/1774934239227-15be9aad-ac91-44bc-8f86-cc80fc3d1231.jpg">
    <div class="caption">Istana Siak</div>
  </div>

  <div class="item">
    <img src="https://image2url.com/r2/default/images/1774869160224-9ace4db1-8060-4b79-9069-55cf1c60d3ff.jpg">
    <div class="caption">Jembatan Siak</div>
  </div>

  <div class="item">
    <img src="https://image2url.com/r2/default/images/1774870090653-11dc4758-b2e5-4359-bd9d-6aac31b3b007.jpg">
    <div class="caption">Hutan Raya</div>
  </div>

  <div class="item">
    <img src="https://image2url.com/r2/default/images/1774874289306-baf2621b-0080-4dce-8b3c-9ef267d1f898.jpg">
    <div class="caption">Tari Zapin</div>
  </div>

  <div class="item">
    <img src="https://image2url.com/r2/default/images/1774873357949-304e7058-e495-4c6f-8416-e3c8548db25c.jpg">
    <div class="caption">Pacu Jalur</div>
  </div>

  <div class="item">
    <img src="https://image2url.com/r2/default/images/1774874633888-5ae39407-c4f7-4857-8069-73f15a3608c8.jpg">
    <div class="caption">Tenun Siak</div>
  </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <img id="popup-img">
</div>

<script>
const items = document.querySelectorAll('.item');
const popup = document.getElementById('popup');
const popupImg = document.getElementById('popup-img');

/* klik gambar */
items.forEach(item => {
  item.addEventListener('click', () => {
    popup.classList.add('active');
    popupImg.src = item.querySelector('img').src;
  });
});

/* close */
popup.addEventListener('click', () => {
  popup.classList.remove('active');
});

/* animasi scroll */
window.addEventListener('scroll', () => {
  const trigger = window.innerHeight * 0.85;

  items.forEach(item => {
    const top = item.getBoundingClientRect().top;
    if(top < trigger){
      item.classList.add('show');
    }
  });
});
</script>

</body>
</html>
