<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eksplore Siak</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Georgia, serif;
}


.navbar{
position:fixed;
top:0;
width:100%;
height:50px;
background:transparent;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
transition:0.4s;
z-index:10;
}

.logo{
font-size:18px;
font-weight:bold;
color:white;
}

.icon{
font-size:20px;
color:white;
}


.navbar.active{
background:#fff9c4;
}

.navbar.active .logo,
.navbar.active .icon{
color:#333;
}


.hero{
position:relative;
height:100vh;
background-image:url("https://image2url.com/r2/default/images/1774934239227-15be9aad-ac91-44bc-8f86-cc80fc3d1231.jpg");
background-size:cover;
background-position:center;
}

.kecil{
position:absolute;
top:38%;
left:50%;
transform:translate(-50%,-50%);
color:#FFD84D;
font-size:28px;
}

.besar{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:#FFD84D;
font-size:120px;
font-weight:bold;
}


.video-section{
background:#fff9c4;
padding:80px 0;
text-align:center;
}

.video-title{
font-size:40px;
font-weight:bold;
margin-bottom:30px;
color:#333;
}

.video-section video{
width:70%;
max-width:700px;
border-radius:10px;
}

</style>
</head>

<body>

<!-- MENU -->
<div class="navbar" id="navbar">
<div class="icon">☰</div>
<div class="logo">Siak</div>
<div class="icon">♡</div>
</div>

<!-- HERO -->
<div class="hero">
<div class="kecil">Datang dan jelajahi</div>
<div class="besar">Eksplore Siak</div>
</div>

<!-- VIDEO -->
<div class="video-section">

<div class="video-title">
Video Wisata Siak
</div>

<video autoplay muted loop playsinline>
<source src="https://image2url.com/r2/default/videos/1774421116080-fd06d6fa-4493-410e-8373-7c3ad8818755.mp4" type="video/mp4">
</video>

</div>

<script>


window.addEventListener("scroll", function(){
let navbar = document.getElementById("navbar");
if(window.scrollY > 50){
navbar.classList.add("active");
}else{
navbar.classList.remove("active");
}
});

</script>

</body>
</html>
