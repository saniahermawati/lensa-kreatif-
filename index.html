<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eksplore Siak</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Georgia, serif;
}


.navbar{
position:fixed;
top:0;
width:100%;
height:50px;
background:transparent;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
transition:0.4s;
z-index:10;
}

.icon{
font-size:22px;
color:white;
cursor:pointer;
}


.navbar.active{
background:#fff9c4;
}

.navbar.active .icon{
color:#333;
}


.sidebar{
position:fixed;
top:0;
left:-270px;
width:270px;
height:100%;
background:#fff9c4;
padding-top:60px;
transition:0.3s;
z-index:20;
}

.sidebar.active{
left:0;
}

.sidebar ul{
list-style:none;
}

.sidebar ul li{
border-bottom:1px solid #ddd;
}

.sidebar ul li a{
display:flex;
align-items:center;
gap:12px;
padding:15px 20px;
text-decoration:none;
color:#333;
font-weight:500;
transition:0.2s;
}

.sidebar ul li a:hover{
background:#ffe082;
}

.menu-icon{
font-size:18px;
}


.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
opacity:0;
visibility:hidden;
transition:0.3s;
z-index:15;
}

.overlay.active{
opacity:1;
visibility:visible;
}


.hero{
position:relative;
height:100vh;
background-image:url("https://image2url.com/r2/default/images/1774934239227-15be9aad-ac91-44bc-8f86-cc80fc3d1231.jpg");
background-size:cover;
background-position:center;
}

.kecil{
position:absolute;
top:38%;
left:50%;
transform:translate(-50%,-50%);
color:#FFD84D;
font-size:28px;
}

.besar{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:#FFD84D;
font-size:80px;
font-weight:bold;
text-align:center;
}


.video-section{
background:#fff9c4;
padding:80px 0;
text-align:center;
}

.video-title{
font-size:30px;
font-weight:bold;
margin-bottom:30px;
color:#333;
}

.video-section video{
width:90%;
max-width:600px;
border-radius:10px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar" id="navbar">
<div class="icon" onclick="openMenu()">☰</div>
<div class="icon">♡</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<ul>
<li><a href="wisata.html" onclick="closeMenu()"><span class="menu-icon">🏝️</span> Wisata</a></li>
<li><a href="budaya.html" onclick="closeMenu()"><span class="menu-icon">🏛️</span> Budaya</a></li>
<li><a href="kuliner.html" onclick="closeMenu()"><span class="menu-icon">🍜</span> Kuliner</a></li>
<li><a href="hotel.html" onclick="closeMenu()"><span class="menu-icon">🏨</span> Hotel</a></li>
<li><a href="transportasi.html" onclick="closeMenu()"><span class="menu-icon">🚗</span> Transportasi</a></li>
<li><a href="events.html" onclick="closeMenu()"><span class="menu-icon">🎉</span> Events</a></li>
<li><a href="review.html" onclick="closeMenu()"><span class="menu-icon">⭐</span> Review</a></li>
<li><a href="tiket.html" onclick="closeMenu()"><span class="menu-icon">🎫</span> Tiket</a></li>
<li><a href="rencana.html" onclick="closeMenu()"><span class="menu-icon">🗺️</span> Rencana</a></li>
<li><a href="bantuan.html" onclick="closeMenu()"><span class="menu-icon">❓</span> Bantuan</a></li>
<li><a href="peta.html" onclick="closeMenu()"><span class="menu-icon">📍</span> Peta</a></li>
<li><a href="pemesanan.html" onclick="closeMenu()"><span class="menu-icon">🛒</span> Pemesanan</a></li>
</ul>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- HERO -->
<div class="hero">
<div class="kecil">Datang dan jelajahi</div>
<div class="besar">Eksplore Siak</div>
</div>

<!-- VIDEO -->
<div class="video-section">
<div class="video-title">Video Wisata Siak</div>

<video autoplay muted loop playsinline>
<source src="https://image2url.com/r2/default/videos/1774421116080-fd06d6fa-4493-410e-8373-7c3ad8818755.mp4" type="video/mp4">
</video>

</div>

<script>


window.addEventListener("scroll", function(){
let navbar = document.getElementById("navbar");
if(window.scrollY > 50){
navbar.classList.add("active");
}else{
navbar.classList.remove("active");
}
});


function openMenu(){
document.getElementById("sidebar").classList.add("active");
document.getElementById("overlay").classList.add("active");
}

function closeMenu(){
document.getElementById("sidebar").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}

</script>

</body>
</html>
