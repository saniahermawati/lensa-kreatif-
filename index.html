<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eksplore Siak</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI', sans-serif;
scroll-behavior:smooth;
}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
height:75px;
display:flex;
align-items:center;
padding:0 25px;
z-index:100;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(10px);
transition:0.4s;
}

.logo{
font-size:26px;
font-weight:bold;
color:#FFD84D;
margin-right:25px;
}

.menu{
display:flex;
gap:25px;
overflow-x:auto;
white-space:nowrap;
}

.menu::-webkit-scrollbar{
display:none;
}

.menu a{
text-decoration:none;
color:white;
font-size:17px;
position:relative;
}

.menu a::after{
content:'';
position:absolute;
left:0;
bottom:-5px;
width:0%;
height:2px;
background:#FFD84D;
transition:0.3s;
}

.menu a:hover::after{
width:100%;
}

.navbar.active{
background:#fff9c4;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.navbar.active .menu a,
.navbar.active .logo{
color:#333;
}


.hero{
position:relative;
height:100vh;
overflow:hidden;
}


.hero video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}


.hero::after{
content:'';
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
top:0;
left:0;
}

.hero-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:#FFD84D;
font-size:90px;
font-weight:bold;
z-index:2;
text-align:center;
}

.sub{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:30px;
z-index:2;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar" id="navbar">
<div class="logo">Siak</div>

<div class="menu">
<a href="#">Wisata</a>
<a href="#">Budaya</a>
<a href="#">Kuliner</a>
<a href="#">Galery</a>
<a href="#">Hotel</a>
<a href="#">Transportasi</a>
<a href="#">Event</a>
<a href="#">Riview</a>
<a href="#">Tiket</a>
<a href="#">Kerangka Waktu</a>
<a href="#">Pusat Bantuan</a>
<a href="#">Peta</a>
<a href="#">Pemesanan</a>
</div>
</div>

<!-- HERO VIDEO -->
<div class="hero">

<video autoplay muted loop playsinline>
<source src="https://image2url.com/r2/default/videos/1774421116080-fd06d6fa-4493-410e-8373-7c3ad8818755.mp4" type="video/mp4">
</video>

<div class="sub">Datang dan Jelajahi</div>
<div class="hero-text">Eksplore Siak</div>

</div>

<script>
window.addEventListener("scroll", function(){
let navbar = document.getElementById("navbar");
if(window.scrollY > 50){
navbar.classList.add("active");
}else{
navbar.classList.remove("active");
}
});
</script>

</body>
</html>
