<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pemesanan Tiket Wisata Kabupaten Siak</title>

<style>

body{
font-family:Arial;
background:#FFF9C4;
margin:0;
padding:0;
}

h1{
text-align:center;
color:#FFB300;
margin-top:20px;
}

.form-box{
width:90%;
max-width:500px;
margin:30px auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#FFB300;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#FF9800;
color:white;
}

.struk{
display:none;
width:90%;
max-width:500px;
margin:30px auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.struk h2{
text-align:center;
color:#FFB300;
}

.kode{
font-weight:bold;
color:red;
}

</style>
</head>

<body>

<h1>Pemesanan Tiket Wisata Kabupaten Siak</h1>

<div class="form-box">

<form id="formPesan">

<input type="text" id="nama" placeholder="Nama Pemesan" required>

<input type="email" id="email" placeholder="Email" required>

<select id="wisata">
<option>Istana Siak</option>
<option>Taman Wisata Alam</option>
<option>Wisata Sungai Siak</option>
</select>

<input type="number" id="jumlah" placeholder="Jumlah Orang" required>

<input type="text" id="orang" placeholder="Nama Orang Yang Ikut (pisahkan dengan koma)" required>

<!-- PILIHAN KENDARAAN -->
<select id="kendaraan">
<option>Kendaraan Jemputan Wisata</option>
<option>Kendaraan Pribadi</option>
</select>

<input type="date" id="tanggal" required>

<button type="submit">Pesan Tiket</button>

</form>

</div>


<div class="struk" id="struk">

<h2>Struk Pemesanan</h2>

<p><b>Nama Pemesan:</b> <span id="sNama"></span></p>

<p><b>Email:</b> <span id="sEmail"></span></p>

<p><b>Destinasi:</b> <span id="sWisata"></span></p>

<p><b>Jumlah Orang:</b> <span id="sJumlah"></span></p>

<p><b>Nama Pengunjung:</b> <span id="sOrang"></span></p>

<p><b>Kendaraan:</b> <span id="sKendaraan"></span></p>

<p><b>Tanggal:</b> <span id="sTanggal"></span></p>

<p class="kode">Kode Booking: <span id="kode"></span></p>

</div>


<script>

document.getElementById("formPesan").addEventListener("submit",function(e){

e.preventDefault()

let nama=document.getElementById("nama").value
let email=document.getElementById("email").value
let wisata=document.getElementById("wisata").value
let jumlah=document.getElementById("jumlah").value
let orang=document.getElementById("orang").value
let kendaraan=document.getElementById("kendaraan").value
let tanggal=document.getElementById("tanggal").value

document.getElementById("sNama").innerText=nama
document.getElementById("sEmail").innerText=email
document.getElementById("sWisata").innerText=wisata
document.getElementById("sJumlah").innerText=jumlah
document.getElementById("sOrang").innerText=orang
document.getElementById("sKendaraan").innerText=kendaraan
document.getElementById("sTanggal").innerText=tanggal

let kode="SIK"+Math.floor(Math.random()*10000)

document.getElementById("kode").innerText=kode

document.getElementById("struk").style.display="block"

})

</script>

</body>
</html>
