<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kuliner Siak</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    background: #FFFACD;
    margin: 0;
    padding: 0;
  }

  h2 {
    text-align: center;
    margin: 20px 0;
    font-size: 28px;
    color: #333;
  }

  
  .carousel {
    display: flex;
    overflow-x: auto;
    scroll-behavior: smooth;
    padding: 20px;
    gap: 20px;
  }

  .carousel::-webkit-scrollbar {
    display: none;
  }

  
  .card {
    position: relative;
    width: 250px;       
    height: 350px;      
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    cursor: pointer;
    flex-shrink: 0;
    background: #fff;
    transition: transform 0.3s;
  }

  .card:hover {
    transform: scale(1.05);
  }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;  
  }

  
  .overlay {
    position: absolute;
    bottom: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.6));
    width: 100%;
    color: #fff;
    padding: 10px;
    box-sizing: border-box;
    text-align: center;
    font-weight: bold;
    font-size: 18px;
  }

  
  .popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: #fff;
    padding: 20px;
    border-radius: 20px;
    width: 80%;
    max-width: 400px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    transition: transform 0.3s;
    z-index: 100;
  }

  .popup.active {
    transform: translate(-50%, -50%) scale(1);
  }

  .popup h3 {
    margin-top: 0;
    color: #333;
  }

  .popup p {
    margin-bottom: 0;
    color: #555;
  }

  
  .overlay-bg {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.5);
    display: none;
    z-index: 50;
  }

  .overlay-bg.active {
    display: block;
  }
</style>
</head>
<body>

<h2>kuliner Siak</h2>

<div class="carousel">
  <div class="card" data-title="roti jala kari ayam" data-desc="Roti jala kari ayam Siak adalah varian khas dari hidangan Melayu yang hadir dengan sentuhan cita rasa lokal dari Kabupaten Siak, Riau. Hidangan ini menggabungkan keunikan roti jala yang berbentuk seperti jaring tipis dengan kuah kari ayam yang kaya rempah khas daerah tersebut. Roti jala dibuat dari adonan tepung terigu, telur, dan santan, dicetak menjadi anyaman tipis menyerupai jaring yang halus, lalu dimasak hingga lembut namun tetap kenyal.">
    <img src="https://image2url.com/r2/default/images/1774958518629-b131e8a6-04ee-474b-9d87-1a76f6b9393f.jpg" alt="">
    <div class="overlay">roti jala kari ayam</div>
  </div>
  <div class="card" data-title="mie sagu" data-desc="Mie sagu khas Siak adalah varian mie tradisional yang memadukan cita rasa lokal Kabupaten Siak, Riau, dengan bahan dasar sagu yang menjadi ciri khas wilayah timur Sumatera. Berbeda dengan mie biasa yang dibuat dari tepung terigu, mie sagu khas Siak terbuat dari pati sagu yang diekstrak dari batang pohon sagu, sehingga teksturnya lebih kenyal, lembut, dan elastis saat dimasak. Warna mie ini biasanya putih pucat hingga sedikit transparan, dan rasanya netral, sehingga cocok dipadukan dengan berbagai kuah dan bumbu khas Melayu Siak.">
    <img src="https://image2url.com/r2/default/images/1774958856000-323a4118-c1c3-4c6d-8719-1d26b88ffd28.jpeg" alt="">
    <div class="overlay">mie sagu</div>
  </div>
  <div class="card" data-title="gulai ikan patin" data-desc="Gulai ikan patin khas Siak adalah salah satu hidangan tradisional Melayu yang menjadi kebanggaan kuliner Kabupaten Siak, Riau. Hidangan ini menggunakan ikan patin, ikan air tawar yang dagingnya lembut, gurih, dan mudah menyerap bumbu. Ikan patin dipadukan dengan kuah gulai yang kaya rempah, diolah menggunakan santan kelapa segar sehingga menghasilkan rasa gurih, kental, dan aromanya harum.">
    <img src="https://image2url.com/r2/default/images/1774959085739-ff917742-acea-4717-a305-fb15c64cb05d.png" alt="">
    <div class="overlay">gulai ikan patin</div>
  </div>
</div>

<div class="overlay-bg"></div>

<div class="popup">
  <h3 id="popup-title"></h3>
  <p id="popup-desc"></p>
</div>

<script>
  const cards = document.querySelectorAll('.card');
  const popup = document.querySelector('.popup');
  const overlayBg = document.querySelector('.overlay-bg');
  const popupTitle = document.getElementById('popup-title');
  const popupDesc = document.getElementById('popup-desc');

  cards.forEach(card => {
    card.addEventListener('click', () => {
      const isActive = popup.classList.contains('active') && popupTitle.innerText === card.dataset.title;
      if (isActive) {
        popup.classList.remove('active');
        overlayBg.classList.remove('active');
      } else {
        popupTitle.innerText = card.dataset.title;
        popupDesc.innerText = card.dataset.desc;
        popup.classList.add('active');
        overlayBg.classList.add('active');
      }
    });
  });

  overlayBg.addEventListener('click', () => {
    popup.classList.remove('active');
    overlayBg.classList.remove('active');
  });
</script>

</body>
</html>
