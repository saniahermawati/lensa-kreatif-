<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eksplore Siak</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Georgia, serif;
}

.navbar{
position:fixed;
top:0;
width:100%;
height:50px;
background:transparent;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
transition:0.4s;
z-index:10;
}

.logo{
font-size:18px;
font-weight:bold;
color:white;
}

.icon{
font-size:20px;
color:white;
}

.navbar.active{
background:#fff9c4;
}

.navbar.active .logo,
.navbar.active .icon{
color:#333;
}


.hero{
height:100vh;
background:url("https://image2url.com/r2/default/images/1774934239227-15be9aad-ac91-44bc-8f86-cc80fc3d1231.jpg");
background-size:cover;
background-position:center;
position:relative;
}

.kecil{
position:absolute;
top:38%;
left:50%;
transform:translate(-50%,-50%);
color:#FFD84D;
font-size:28px;
}

.besar{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:#FFD84D;
font-size:80px;
font-weight:bold;
text-align:center;
}


.video-section{
background:#fff9c4;
padding:80px 20px;
text-align:center;
}

.video-title{
font-size:32px;
margin-bottom:20px;
}

.video-section video{
width:80%;
max-width:600px;
border-radius:10px;
}


h2{
text-align:center;
margin:30px 0;
}

.carousel{
display:flex;
overflow-x:auto;
gap:20px;
padding:20px;
}

.carousel::-webkit-scrollbar{
display:none;
}

.card{
width:250px;
height:350px;
border-radius:20px;
overflow:hidden;
flex-shrink:0;
position:relative;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
bottom:0;
width:100%;
padding:10px;
background:linear-gradient(transparent, rgba(0,0,0,0.6));
color:white;
text-align:center;
}

/* POPUP */
.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:white;
padding:20px;
border-radius:20px;
width:80%;
max-width:400px;
transition:0.3s;
z-index:100;
}

.popup.active{
transform:translate(-50%,-50%) scale(1);
}

.overlay-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
z-index:50;
}

.overlay-bg.active{
display:block;
}


.section{
padding:30px;
background:#FFF6CC;
}

.card-box{
background:white;
padding:20px;
border-radius:12px;
margin-top:20px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar" id="navbar">
<div class="icon">☰</div>
<div class="logo">Siak</div>
<div class="icon">♡</div>
</div>

<!-- HERO -->
<div class="hero">
<div class="kecil">Datang dan jelajahi</div>
<div class="besar">Eksplore Siak</div>
</div>

<!-- VIDEO -->
<div class="video-section">
<div class="video-title">Video Wisata Siak</div>
<video autoplay muted loop>
<source src="https://image2url.com/r2/default/videos/1774421116080-fd06d6fa-4493-410e-8373-7c3ad8818755.mp4">
</video>
</div>

<!-- WISATA -->
<h2>Destinasi Wisata</h2>

<div class="carousel">
<div class="card" data-title="Istana Siak" data-desc="Istana bersejarah di Siak.">
<img src="https://image2url.com/r2/default/images/1774934239227-15be9aad-ac91-44bc-8f86-cc80fc3d1231.jpg">
<div class="overlay">Istana Siak</div>
</div>

<div class="card" data-title="Jembatan Tengku Agung" data-desc="Jembatan ikonik Siak.">
<img src="https://image2url.com/r2/default/images/1774869160224-9ace4db1-8060-4b79-9069-55cf1c60d3ff.jpg">
<div class="overlay">Jembatan</div>
</div>

<div class="card" data-title="Danau Zamrud" data-desc="Danau indah di Siak.">
<img src="https://image2url.com/r2/default/images/1774870090653-11dc4758-b2e5-4359-bd9d-6aac31b3b007.jpg">
<div class="overlay">Danau Zamrud</div>
</div>
</div>

<!-- BUDAYA -->
<div class="section">
<h2>Budaya Siak</h2>

<div class="card-box">
Kabupaten Siak memiliki budaya Melayu yang kuat sejak masa Kesultanan.
</div>

<div class="carousel">
<div class="card" data-title="Tari Zapin" data-desc="Tarian tradisional Melayu.">
<img src="https://image2url.com/r2/default/images/1774874289306-baf2621b-0080-4dce-8b3c-9ef267d1f898.jpg">
<div class="overlay">Tari Zapin</div>
</div>

<div class="card" data-title="Pacu Jalur" data-desc="Lomba perahu tradisional.">
<img src="https://image2url.com/r2/default/images/1774873357949-304e7058-e495-4c6f-8416-e3c8548db25c.jpg">
<div class="overlay">Pacu Jalur</div>
</div>

<div class="card" data-title="Tenun Siak" data-desc="Kain tradisional Melayu.">
<img src="https://image2url.com/r2/default/images/1774874633888-5ae39407-c4f7-4857-8069-73f15a3608c8.jpg">
<div class="overlay">Tenun Siak</div>
</div>
</div>
</div>

<!-- POPUP -->
<div class="overlay-bg"></div>

<div class="popup">
<h3 id="popup-title"></h3>
<p id="popup-desc"></p>
</div>

<script>


window.addEventListener("scroll", function(){
let navbar = document.getElementById("navbar");
navbar.classList.toggle("active", window.scrollY > 50);
});

const cards=document.querySelectorAll('.card');
const popup=document.querySelector('.popup');
const overlayBg=document.querySelector('.overlay-bg');
const popupTitle=document.getElementById('popup-title');
const popupDesc=document.getElementById('popup-desc');

cards.forEach(card=>{
card.addEventListener('click',()=>{
popupTitle.innerText=card.dataset.title;
popupDesc.innerText=card.dataset.desc;
popup.classList.add('active');
overlayBg.classList.add('active');
});
});

overlayBg.addEventListener('click',()=>{
popup.classList.remove('active');
overlayBg.classList.remove('active');
});

</script>

</body>
</html>
