<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review Instagram Wisata</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #FFF9C4; 
    margin:0;
    padding:0;
  }
  h2 {
    text-align:center;
    margin:20px 0;
    color:#FFB300;
  }

  .slider-container {
    position: relative;
    width:90%;
    max-width:500px;
    margin:0 auto;
    overflow:hidden;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
  }

  .slider {
    display:flex;
    transition: transform 0.5s ease-in-out;
  }

  .slide {
    min-width:100%;
    box-sizing:border-box;
    position:relative;
  }

  .slide iframe {
    width:100%;
    height:600px;
    border:none;
    border-radius:15px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .slide:hover iframe {
    transform: scale(1.05);
    box-shadow:0 0 20px rgba(255,193,7,0.7), 0 0 40px rgba(255,235,59,0.6);
  }

  .instagram-logo {
    position:absolute;
    top:10px;
    right:10px;
    width:40px;
    height:40px;
    background:url('https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg') no-repeat center center;
    background-size:contain;
    z-index:10;
  }

  .nav-btn {
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(255,193,7,0.7);
    color:#000;
    border:none;
    font-size:24px;
    padding:10px;
    cursor:pointer;
    border-radius:50%;
    transition:all 0.3s ease;
  }

  .nav-btn:hover { background:rgba(255,235,59,0.9); }
  .prev { left:10px; } 
  .next { right:10px; }
</style>
</head>
<body>

<h2>Review Instagram Wisata Siak</h2>

<div class="slider-container">
  <div class="instagram-logo"></div>
  <div class="slider">
    <!-- Slide 1 -->
    <div class="slide">
      <iframe src="https://www.instagram.com/reel/DVbJpiWEjhc/embed" allowfullscreen></iframe>
    </div>
    <!-- Slide 2 -->
    <div class="slide">
      <iframe src="https://www.instagram.com/reel/DBOQmWGNJdA/embed" allowfullscreen></iframe>
    </div>
    <!-- Slide 3 -->
    <div class="slide">
      <iframe src="https://www.instagram.com/reel/C7ldSWDPFqZ/embed" allowfullscreen></iframe>
    </div>
  </div>

  <button class="nav-btn prev">&#10094;</button>
  <button class="nav-btn next">&#10095;</button>
</div>

<script>
  const slider = document.querySelector('.slider');
  const slides = document.querySelectorAll('.slide');
  const prevBtn = document.querySelector('.prev');
  const nextBtn = document.querySelector('.next');
  let index = 0;

  function showSlide(i){
    if(i<0) index=slides.length-1;
    else if(i>=slides.length) index=0;
    else index=i;
    slider.style.transform = `translateX(-${index*100}%)`;
  }

  prevBtn.addEventListener('click', ()=>showSlide(index-1));
  nextBtn.addEventListener('click', ()=>showSlide(index+1));

  setInterval(()=>showSlide(index+1),5000);

  // swipe support
  let startX=0;
  slider.addEventListener('touchstart', e=>startX=e.touches[0].clientX);
  slider.addEventListener('touchend', e=>{
    let endX=e.changedTouches[0].clientX;
    if(startX-endX>50) showSlide(index+1);
    if(endX-startX>50) showSlide(index-1);
  });
</script>

</body>
</html>
