<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wisata Siak</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    background: #FFFACD;
    margin: 0;
    padding: 0;
  }

  h2 {
    text-align: center;
    margin: 20px 0;
    font-size: 28px;
    color: #333;
  }

  
  .carousel {
    display: flex;
    overflow-x: auto;
    scroll-behavior: smooth;
    padding: 20px;
    gap: 20px;
  }

  .carousel::-webkit-scrollbar {
    display: none;
  }

  
  .card {
    position: relative;
    width: 250px;       
    height: 350px;      
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    cursor: pointer;
    flex-shrink: 0;
    background: #fff;
    transition: transform 0.3s;
  }

  .card:hover {
    transform: scale(1.05);
  }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;  
  }

  
  .overlay {
    position: absolute;
    bottom: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.6));
    width: 100%;
    color: #fff;
    padding: 10px;
    box-sizing: border-box;
    text-align: center;
    font-weight: bold;
    font-size: 18px;
  }

 
  .popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: #fff;
    padding: 20px;
    border-radius: 20px;
    width: 80%;
    max-width: 400px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    transition: transform 0.3s;
    z-index: 100;
  }

  .popup.active {
    transform: translate(-50%, -50%) scale(1);
  }

  .popup h3 {
    margin-top: 0;
    color: #333;
  }

  .popup p {
    margin-bottom: 0;
    color: #555;
  }

  
  .overlay-bg {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.5);
    display: none;
    z-index: 50;
  }

  .overlay-bg.active {
    display: block;
  }
</style>
</head>
<body>

<h2>Destinasi Wisata Siak</h2>

<div class="carousel">
  <div class="card" data-title="Istana Siak Sri Indrapura" data-desc="Istana Siak Sri Indrapura merupakan salah satu tempat wisata bersejarah yang berada di Provinsi Riau. Bangunan ini memiliki arsitektur yang indah dan menjadi simbol kejayaan .Kabupaten Siak sendiri dikenal sebagai daerah yang kaya akan sejarah dan budaya Melayu yang masih terjaga dengan baik. Istana Siak menjadi ikon utama yang menarik banyak wisatawan, baik dari dalam maupun luar negeri. Selain itu, daerah ini juga memiliki sungai yang indah serta berbagai destinasi wisata alam yang menarik.">
    <img src="https://image2url.com/r2/default/images/1774934239227-15be9aad-ac91-44bc-8f86-cc80fc3d1231.jpg" alt="">
    <div class="overlay">Istana Siak sri indrapura</div>
  </div>
  <div class="card" data-title="jembatan tengku agung" data-desc="Jembatan Tengku Agung Sultanah Latifah (TASL) adalah jembatan cable-stayed megah sepanjang 1.196 meter yang melintasi Sungai Siak di Riau, diresmikan pada 2007. Menghubungkan Kecamatan Siak dan Mempura, jembatan ini ikon kota dengan dua menara setinggi 80 meter yang dilengkapi lift, rumah makan, dan diorama.">
    <img src="https://image2url.com/r2/default/images/1774869160224-9ace4db1-8060-4b79-9069-55cf1c60d3ff.jpg" alt="">
    <div class="overlay">jembatan tengku agung</div>
  </div>
  <div class="card" data-title="danau zambrud" data-desc="Danau Zamrud adalah permata tersembunyi di Kabupaten Siak, Riau, yang kini berstatus sebagai bagian dari Taman Nasional (TN) Zamrud. Danau ini merupakan salah satu ekosistem rawa gambut terbaik di Indonesia dan sering disebut sebagai "surga rahasia" karena keindahan serta kelestariannya yang masih sangat terjaga.">
    <img src="https://image2url.com/r2/default/images/1774870090653-11dc4758-b2e5-4359-bd9d-6aac31b3b007.jpg" alt="">
    <div class="overlay">danau zambrud</div>
  </div>
</div>

<div class="overlay-bg"></div>

<div class="popup">
  <h3 id="popup-title"></h3>
  <p id="popup-desc"></p>
</div>

<script>
  const cards = document.querySelectorAll('.card');
  const popup = document.querySelector('.popup');
  const overlayBg = document.querySelector('.overlay-bg');
  const popupTitle = document.getElementById('popup-title');
  const popupDesc = document.getElementById('popup-desc');

  cards.forEach(card => {
    card.addEventListener('click', () => {
      const isActive = popup.classList.contains('active') && popupTitle.innerText === card.dataset.title;
      if (isActive) {
        popup.classList.remove('active');
        overlayBg.classList.remove('active');
      } else {
        popupTitle.innerText = card.dataset.title;
        popupDesc.innerText = card.dataset.desc;
        popup.classList.add('active');
        overlayBg.classList.add('active');
      }
    });
  });

  overlayBg.addEventListener('click', () => {
    popup.classList.remove('active');
    overlayBg.classList.remove('active');
  });
</script>

</body>
</html>
